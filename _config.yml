title: Júlio Henkes
description: Offensive Security · Cyber Intelligence
url: "https://juliohenkes.github.io"
baseurl: ""

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

permalink: pretty

exclude:
  - convert_writeups.py
  - "*.py"
  - "*.sh"
  - writeup.bkp/
  - Gemfile
  - Gemfile.lock
  - musica/

defaults:
  - scope:
      path: "writeups/easy"
    values:
      layout: writeup
      difficulty: easy
  - scope:
      path: "writeups/intermediate"
    values:
      layout: writeup
      difficulty: intermediate
  - scope:
      path: "writeups/hard"
    values:
      layout: writeup
      difficulty: hard
  - scope:
      path: "cyber/toolkit"
    values:
      layout: cyber
      group: toolkit
  - scope:
      path: "cyber/pentest"
    values:
      layout: cyber
      group: pentest
  - scope:
      path: "cyber/evasion"
    values:
      layout: cyber
      group: evasion
  - scope:
      path: "cyber/exploit-dev"
    values:
      layout: cyber
      group: exploit-dev
  - scope:
      path: "cyber/mobile"
    values:
      layout: cyber
      group: mobile
